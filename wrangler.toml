name = "genztv-cf-pages"
compatibility_date = "2026-07-24"
compatibility_flags = ["nodejs_compat"]

# OpenNext output — Worker entry point + static assets
main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "genztv-db"
database_id = "3f64ead4-83ea-4224-a01b-810f807ffaf8"

# Pages project config
[placement]
mode = "smart"
